query getAllLocksByPage($skip: Int, $limit: Int) {
  locks(
    where: { relocked: false }
    orderBy: lockId
    orderDirection: desc
    skip: $skip
    first: $limit
  ) {
    lockId
    owner {
      id
    }
    amount
    time
    slope
    cliff
    lockCreate {
      id
      timestamp
    }
    delegate {
      id
    }
  }
}
